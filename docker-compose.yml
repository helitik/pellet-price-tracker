services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${FLASK_PORT:-5000}:${FLASK_PORT:-5000}"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-pellet_tracker}
      - MYSQL_USER=${MYSQL_USER:-pellet}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - CRAWL_HOUR=${CRAWL_HOUR:-8}
      - CRAWL_MINUTE=${CRAWL_MINUTE:-0}
      - CRAWL_PRODUCT_CATEGORY=${CRAWL_PRODUCT_CATEGORY:-2}
      - CRAWL_QUANTITY=${CRAWL_QUANTITY:-3}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_TO=${MAIL_TO:-}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - PRICE_DROP_THRESHOLD_PERCENT=${PRICE_DROP_THRESHOLD_PERCENT:-5}
      - TZ=${TZ:-Europe/Paris}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FLASK_PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:11
    volumes:
      - pellet_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-pellet_tracker}
      - MYSQL_USER=${MYSQL_USER:-pellet}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  pellet_data:
